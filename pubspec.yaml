name: movil_si2
description: "Plataforma de Emergencias Vehiculares — App Cliente Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP client
  dio: ^5.7.0

  # Local storage for JWT
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.6.3

  # State management
  provider: ^6.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Geolocation
  geolocator: ^11.0.0

  # Image / file picker
  image_picker: ^1.1.2

  # Runtime permissions
  permission_handler: ^11.3.1

  # Phone calls / deep links
  url_launcher: ^6.3.1

  # Audio recording
  record: ^5.0.5
  audioplayers: ^6.0.0
  path_provider: ^2.1.4

  # Stripe payments
  flutter_stripe: ^12.6.0

  # WebSocket
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
